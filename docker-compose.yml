services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: customer_ai
      POSTGRES_PASSWORD: customer_ai_pass
      POSTGRES_DB: customer_support
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_ai -d customer_support"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: customer_ai
      POSTGRES_PASSWORD: customer_ai_pass
      POSTGRES_DB: customer_support
    volumes:
      - ./customer-support-ai/models:/app/models:ro
      - ./customer-support-ai/src:/app/src:ro

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Airflow ──────────────────────────────────────────────────────────
  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://customer_ai:customer_ai_pass@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./customer-support-ai:/opt/airflow/customer-support-ai:ro
      - ./ingestion:/opt/airflow/ingestion:ro
      - airflow_data:/opt/airflow

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://customer_ai:customer_ai_pass@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONPATH: /opt/airflow:/opt/airflow/customer-support-ai:/opt/airflow/ingestion
    entrypoint: /bin/bash
    command: -c "airflow webserver --port 8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./customer-support-ai:/opt/airflow/customer-support-ai:ro
      - ./ingestion:/opt/airflow/ingestion:ro
      - ./customer-support-ai/models:/opt/airflow/customer-support-ai/models:ro
      - airflow_data:/opt/airflow

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://customer_ai:customer_ai_pass@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONPATH: /opt/airflow:/opt/airflow/customer-support-ai:/opt/airflow/ingestion
    entrypoint: /bin/bash
    command: -c "airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./customer-support-ai:/opt/airflow/customer-support-ai:ro
      - ./ingestion:/opt/airflow/ingestion:ro
      - ./customer-support-ai/models:/opt/airflow/customer-support-ai/models:ro
      - airflow_data:/opt/airflow

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  airflow_data:
