services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: customer_ai
      POSTGRES_PASSWORD: customer_ai_pass
      POSTGRES_DB: customer_support
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer_ai -d customer_support"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: customer_ai
      POSTGRES_PASSWORD: customer_ai_pass
      POSTGRES_DB: customer_support

volumes:
  postgres_data:
